<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decryptor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 2.5rem 1rem; }
  .container { max-width: 700px; margin: 0 auto; }
  .panel { background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
  input[type="text"], input[type="password"], textarea {
    width: 100%; font-family: monospace; font-size: 13px;
    background: #fafaf8; border: 1px solid #ddd; border-radius: 7px;
    padding: 9px 12px; color: #1a1a1a;
  }
  input[type="text"]:focus, input[type="password"]:focus, textarea:focus { outline: none; border-color: #999; background: #fff; }
  textarea { resize: vertical; }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 42px; }
  .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 2px 4px; color: #aaa; font-size: 15px; line-height: 1; }
  .pw-toggle:hover { color: #555; }
  .btn { font-family: inherit; font-size: 14px; font-weight: 500; padding: 9px 22px; border-radius: 7px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; cursor: pointer; transition: background 0.12s; }
  .btn:hover { background: #f0f0eb; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .status-bar { font-size: 13px; padding: 9px 12px; border-radius: 7px; margin-top: 1rem; display: none; }
  .status-bar.ok { background: #eaf6ec; color: #2a6b32; border: 1px solid #b6deba; }
  .status-bar.err { background: #fceaea; color: #8b2020; border: 1px solid #f0baba; }
  .status-bar.info { background: #eaf0fb; color: #1a3f7a; border: 1px solid #b5cef0; }
  #totp-section { display: none; margin-top: 1.5rem; }
  .totp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .totp-card { background: #fff; border: 1px solid #e0e0d8; border-radius: 10px; padding: 14px 16px; position: relative; }
  .totp-label { font-size: 13px; color: #888; margin-bottom: 8px; }
  .totp-code { font-family: "Menlo","Monaco","Consolas",monospace; font-size: 32px; font-weight: 600; letter-spacing: 6px; color: #1a1a1a; margin-bottom: 10px; cursor: pointer; user-select: all; }
  .totp-code:hover { color: #444; }
  .progress-bar-bg { background: #eee; border-radius: 3px; height: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 3px; background: #3a7fd5; transition: width 1s linear; }
  .progress-bar-fill.expiring { background: #d04040; }
  .copy-flash { position: absolute; top: 10px; right: 12px; font-size: 11px; color: #2a6b32; opacity: 0; transition: opacity 0.3s; }
  .copy-flash.show { opacity: 1; }
  .raw-box { background: #fafaf8; border: 1px solid #ddd; border-radius: 7px; padding: 12px 14px; font-family: monospace; font-size: 13px; word-break: break-all; line-height: 1.6; margin-bottom: 10px; cursor: pointer; user-select: all; }
  .raw-box:hover { border-color: #999; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e0; }
    .panel { background: #242424; border-color: #333; }
    input[type="text"], input[type="password"], textarea { background: #2a2a2a; border-color: #3a3a3a; color: #e8e8e0; }
    input[type="text"]:focus, input[type="password"]:focus, textarea:focus { background: #2e2e2e; }
    .btn { background: #242424; border-color: #3a3a3a; color: #e8e8e0; }
    .btn:hover { background: #2e2e2e; }
    label { color: #aaa; }
    .pw-toggle { color: #666; }
    .pw-toggle:hover { color: #aaa; }
    .totp-card { background: #242424; border-color: #333; }
    .raw-box { background: #2a2a2a; border-color: #3a3a3a; color: #e8e8e0; }
    .totp-code { color: #e8e8e0; }
    .progress-bar-bg { background: #333; }
    .status-bar.ok { background: #1a2e1c; color: #6abf74; border-color: #2a5030; }
    .status-bar.err { background: #2e1a1a; color: #e07070; border-color: #5a2a2a; }
    .status-bar.info { background: #1a2040; color: #7090d0; border-color: #2a3560; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="field">
      <label>Encrypted value (base64)</label>
      <textarea id="encrypted-input" rows="4" placeholder="Paste encrypted base64 value"></textarea>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Decryption password" autocomplete="current-password" />
        <button type="button" class="pw-toggle" onclick="togglePw('password','eye1')" id="eye1" aria-label="Show">&#128065;</button>
      </div>
    </div>
    <button class="btn" id="decrypt-btn" onclick="doDecrypt()">Decrypt</button>
    <div class="status-bar" id="status"></div>
  </div>

  <div id="totp-section">
    <div class="totp-grid" id="totp-grid"></div>
  </div>
</div>

<script src="argon2-bundled.min.js"></script>
<script>
function togglePw(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = '&#128064;';
    btn.setAttribute('aria-label', 'Hide');
  } else {
    input.type = 'password';
    btn.innerHTML = '&#128065;';
    btn.setAttribute('aria-label', 'Show');
  }
}

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar ' + type;
  el.style.display = 'block';
}

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function bytesToBase32(bytes) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let bits = 0, value = 0, output = '';
  for (let i = 0; i < bytes.length; i++) {
    value = (value << 8) | bytes[i];
    bits += 8;
    while (bits >= 5) {
      output += alphabet[(value >>> (bits - 5)) & 31];
      bits -= 5;
    }
  }
  if (bits > 0) output += alphabet[(value << (5 - bits)) & 31];
  return output;
}

function padCounter(iv) {
  // AES-CTR requires a 16-byte counter; pad 12-byte IV with 4 zero bytes
  const counter = new Uint8Array(16);
  counter.set(iv, 0);
  return counter;
}

async function doDecrypt() {
  const btn = document.getElementById('decrypt-btn');
  const raw = document.getElementById('encrypted-input').value.trim();
  const pass = document.getElementById('password').value;

  if (!raw) { showStatus('Paste encrypted value.', 'err'); return; }
  if (!pass) { showStatus('Enter password.', 'err'); return; }

  btn.disabled = true;
  const startTime = performance.now();
  showStatus('Deriving key…', 'info');

  try {
    const combined = base64ToBytes(raw.replace(/\s/g, ''));

    // Split: 16 bytes salt + 12 bytes IV + remaining ciphertext
    if (combined.length < 29) throw new Error('Invalid encrypted value.');
    const salt = combined.slice(0, 16);
    const iv = combined.slice(16, 28);
    const ciphertext = combined.slice(28);

    // Argon2id key derivation
    const result = await argon2.hash({
      pass, salt,
      time: 2, mem: 19456, parallelism: 1, hashLen: 32,
      type: argon2.ArgonType.Argon2id,
    });

    // Import key for AES-CTR
    const cryptoKey = await crypto.subtle.importKey(
      'raw', result.hash, { name: 'AES-CTR' }, false, ['decrypt']
    );

    // Decrypt — AES-CTR always succeeds, produces raw bytes regardless of password
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-CTR', counter: padCounter(iv), length: 128 },
      cryptoKey,
      ciphertext
    );

    const secretBytes = new Uint8Array(decrypted);
    const totpSecret = bytesToBase32(secretBytes);

    const elapsed = Math.round(performance.now() - startTime);
    showStatus('Decrypted in ' + elapsed + 'ms.', 'ok');
    renderTOTP(totpSecret);

  } catch (e) {
    showStatus('Error: ' + e.message, 'err');
  }

  btn.disabled = false;
}

// ── TOTP ───────────────────────────────────────────────────────────────────
function base32ToBytes(b32) {
  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
  let bits = 0, value = 0;
  const output = [];
  for (const char of b32.replace(/=+$/, '').toUpperCase()) {
    const idx = alphabet.indexOf(char);
    if (idx < 0) continue;
    value = (value << 5) | idx;
    bits += 5;
    if (bits >= 8) { output.push((value >>> (bits - 8)) & 0xff); bits -= 8; }
  }
  return new Uint8Array(output);
}

async function computeTOTP(secret) {
  const now = Math.floor(Date.now() / 1000);
  const counter = Math.floor(now / 30);
  const key = await crypto.subtle.importKey(
    'raw', base32ToBytes(secret),
    { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
  );
  const counterBuf = new ArrayBuffer(8);
  new DataView(counterBuf).setUint32(4, counter, false);
  const sig = await crypto.subtle.sign('HMAC', key, counterBuf);
  const hmac = new Uint8Array(sig);
  const offset = hmac[hmac.length - 1] & 0x0f;
  const code = ((hmac[offset] & 0x7f) << 24 | hmac[offset+1] << 16 | hmac[offset+2] << 8 | hmac[offset+3]) % 1000000;
  return String(code).padStart(6, '0');
}

let totpSecret = null;
let tickInterval = null;

function renderTOTP(secret) {
  totpSecret = secret;
  const section = document.getElementById('totp-section');
  const grid = document.getElementById('totp-grid');
  grid.innerHTML = '';
  section.style.display = 'block';

  // Always show raw base32 value
  const rawCard = document.createElement('div');
  rawCard.className = 'totp-card';
  rawCard.innerHTML = `
    <div class="totp-label">Decrypted value (base32)</div>
    <div class="raw-box" onclick="copyRaw()" title="Click to copy">${secret}</div>
    <span class="copy-flash" id="raw-flash">Copied!</span>
  `;
  grid.appendChild(rawCard);

  // Also show TOTP code
  const totpCard = document.createElement('div');
  totpCard.className = 'totp-card';
  totpCard.innerHTML = `
    <div class="totp-label">TOTP code</div>
    <div class="totp-code" id="totp-code" onclick="copyCode()" title="Click to copy">··· ···</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="totp-bar"></div></div>
    <span class="copy-flash" id="totp-flash">Copied!</span>
  `;
  grid.appendChild(totpCard);

  if (tickInterval) clearInterval(tickInterval);
  tick();
  tickInterval = setInterval(tick, 1000);
}

async function tick() {
  const now = Math.floor(Date.now() / 1000);
  const remaining = 30 - (now % 30);
  const bar = document.getElementById('totp-bar');
  if (bar) {
    bar.style.width = ((remaining / 30) * 100) + '%';
    bar.className = 'progress-bar-fill' + (remaining <= 5 ? ' expiring' : '');
  }
  if (remaining === 30 || document.getElementById('totp-code').textContent.includes('·')) {
    try {
      const code = await computeTOTP(totpSecret);
      const el = document.getElementById('totp-code');
      if (el) el.textContent = code.slice(0, 3) + ' ' + code.slice(3);
    } catch (e) { console.warn('TOTP error:', e); }
  }
}

async function copyCode() {
  const el = document.getElementById('totp-code');
  const flash = document.getElementById('totp-flash');
  try {
    await navigator.clipboard.writeText(el.textContent.replace(/\s/g, ''));
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 1500);
  } catch {}
}

async function copyRaw() {
  const flash = document.getElementById('raw-flash');
  try {
    await navigator.clipboard.writeText(totpSecret);
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 1500);
  } catch {}
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doDecrypt();
});
</script>
</body>
</html>
